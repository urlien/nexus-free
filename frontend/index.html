<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Free - 虚拟角色检索引擎</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-box input { flex: 1; padding: 15px 20px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: #6366f1; }
        .search-box button { padding: 15px 30px; border: none; border-radius: 8px; background: #6366f1; color: #fff; font-size: 16px; cursor: pointer; }
        .search-box button:hover { background: #5558e6; }
        .search-box button:disabled { background: #333; cursor: not-allowed; }
        .results { margin-top: 20px; }
        .result-card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .result-card:hover { border-color: #6366f1; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .result-name { font-size: 1.3em; font-weight: 600; }
        .result-source { padding: 4px 8px; background: #6366f1; border-radius: 4px; font-size: 12px; }
        .result-summary { color: #888; line-height: 1.6; }
        .result-link { color: #6366f1; text-decoration: none; margin-top: 10px; display: inline-block; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { text-align: center; padding: 20px; background: #2a1a1a; border-radius: 8px; color: #ff6b6b; }
        .empty { text-align: center; padding: 60px; background: #1a1a1a; border-radius: 12px; color: #666; }
        .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 40px; }
        .feature { background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .feature h3 { margin-bottom: 8px; font-size: 1em; }
        .feature p { color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>🔍 Nexus Free</h1>
            <p class="subtitle">虚拟角色检索引擎 - 免费开源版</p>
            
            <div class="search-box">
                <input 
                    v-model="query" 
                    @keyup.enter="search"
                    placeholder="输入角色名搜索（如: 胡桃、阿米娅）"
                >
                <button @click="search" :disabled="loading">
                    {{ loading ? '⏳ 搜索中...' : '🔍 搜索' }}
                </button>
            </div>
            
            <div v-if="error" class="error">
                ❌ {{ error }}
            </div>
            
            <div v-if="loading" class="loading">
                ⏳ 正在搜索 "{{ query }}"...
            </div>
            
            <div v-if="!loading && results.length > 0" class="results">
                <div v-for="item in results" :key="item.name + item.source" class="result-card">
                    <div class="result-header">
                        <span class="result-name">{{ item.name }}</span>
                        <span class="result-source">{{ item.source }}</span>
                    </div>
                    <div class="result-summary">{{ item.summary || '暂无摘要' }}</div>
                    <a v-if="item.url" :href="item.url" target="_blank" class="result-link">
                        🔗 查看详情
                    </a>
                </div>
            </div>
            
            <div v-if="!loading && searched && results.length === 0" class="empty">
                🔍 未找到 "{{ query }}" 的相关结果
            </div>
            
            <div v-if="!searched" class="features">
                <div class="feature">
                    <h3>🔍 多源搜索</h3>
                    <p>Fandom、萌娘百科、PRTS、AniList等</p>
                </div>
                <div class="feature">
                    <h3>🧠 AI分析</h3>
                    <p>自动提取角色关系、世界观</p>
                </div>
                <div class="feature">
                    <h3>📝 角色卡生成</h3>
                    <p>SillyTavern V2标准格式</p>
                </div>
                <div class="feature">
                    <h3>🕸️ 巨型世界书</h3>
                    <p>AI自动构建世界观</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const query = ref('');
                const results = ref([]);
                const loading = ref(false);
                const error = ref('');
                const searched = ref(false);
                
                const search = async () => {
                    if (!query.value.trim()) return;
                    
                    loading.value = true;
                    error.value = '';
                    searched.value = true;
                    
                    try {
                        const resp = await fetch('/api/search?query=' + encodeURIComponent(query.value));
                        if (!resp.ok) throw new Error('搜索请求失败');
                        
                        const data = await resp.json();
                        results.value = data.results || [];
                    } catch (e) {
                        error.value = e.message;
                        results.value = [];
                    } finally {
                        loading.value = false;
                    }
                };
                
                return { query, results, loading, error, searched, search };
            }
        }).mount('#app');
    </script>
</body>
</html>
